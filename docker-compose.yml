services:

  # ─────────────────────────────────────────────
  # Servicio 1: API FastAPI (backend)
  # ─────────────────────────────────────────────
  api:
    build: .
    container_name: heladeria-api
    restart: always
    command: uvicorn API.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    volumes:
      - ./DataBase:/app/DataBase   # Base de datos persistente
    networks:
      - heladeria-net

  # ─────────────────────────────────────────────
  # Servicio 2: Dashboard Streamlit (frontend)
  # ─────────────────────────────────────────────
  app:
    build: .
    container_name: heladeria-app
    restart: always
    command: streamlit run App/App.py --server.address 0.0.0.0
    ports:
      - "8501:8501"
    environment:
      - API_URL=http://api:8000
    depends_on:
      - api
    volumes:
      - .:/app
    networks:
      - heladeria-net

  # ─────────────────────────────────────────────
  # Servicio 3: Agente de Voz (IA + micrófono)
  #
  # Acceso al audio de la Raspberry Pi:
  #   - devices: comparte todos los nodos de /dev/snd
  #   - group_add: el proceso dentro del contenedor tendrá GID del grupo "audio"
  #     (necesario para que PyAudio/ALSA puedan abrir los dispositivos)
  #   - volumes: /proc/asound → información de tarjetas para ALSA
  #   - ALSA_CARD: índice de la tarjeta de micrófono (ajustar si es necesario)
  #     0=integrado, 1=ALC236, 2=USB → normalmente el USB mic es 1 en Raspi
  #
  # NOTA: network_mode host se usa para que el agente pueda llegar a Ollama
  # que corre en el host de la Raspberry Pi (no en Docker).
  # La API se alcanza por localhost:8000 porque está publicada en el host.
  # ─────────────────────────────────────────────
  voz:
    build: .
    container_name: heladeria-voz
    restart: always
    command: python Local_agent_voz.py
    depends_on:
      - api
    volumes:
      - ./piper:/app/piper
      - ./modelo_vosk:/app/modelo_vosk
      - ./voz_es.onnx:/app/voz_es.onnx
      - ./voz_es.onnx.json:/app/voz_es.onnx.json
      - /proc/asound:/proc/asound:ro          # Info de tarjetas ALSA (solo lectura)
      - /run/user/1000/pulse:/run/pulse:ro    # Socket PulseAudio del host (si existe)
    # ── Acceso al hardware de audio ──────────────────────────
    devices:
      - /dev/snd:/dev/snd
    group_add:
      - audio                                 # GID del grupo audio del host
    # ── Variables de entorno ─────────────────────────────────
    environment:
      - API_URL=http://localhost:8000          # API publicada en el host via network_mode host
      - OLLAMA_HOST=http://localhost:11434     # Ollama corre en el host
      - OLLAMA_MODEL=llama3.2
      # - ALSA_CARD=1                           # Índice del micrófono USB en Raspberry Pi
      #                                         # Cambiar a 0 si el mic es el integrado
      - PYTHONUNBUFFERED=1
    # network_mode host es necesario para alcanzar Ollama y la API en el host
    network_mode: host

networks:
  heladeria-net:
    driver: bridge
