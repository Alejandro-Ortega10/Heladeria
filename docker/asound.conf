# /etc/asound.conf — Configuración ALSA para Raspberry Pi en Docker
#
# Separa CAPTURA (micrófono USB en card 1) de REPRODUCCIÓN (bcm2835 en card 0).
# Esto evita el error -9997 que ocurre cuando ALSA intenta usar el bcm2835
# integrado para captura (no lo soporta).
#
# Si el micrófono USB está en otra tarjeta (ej. card 2), cambia hw:1 → hw:2
# tanto aquí como en ALSA_CARD en el docker-compose.yml.

pcm.!default {
    type asym
    playback.pcm {
        type plug
        slave.pcm "hw:0,0"
    }
    capture.pcm {
        type plug
        slave.pcm "hw:3,0"
    }
}

ctl.!default {
    type hw
    card 3
}
