# /etc/asound.conf — Configuración ALSA mínima para Raspberry Pi en Docker
#
# Elimina los errores de PCM inexistentes (rear, center_lfe, side, etc.)
# y establece la tarjeta USB como dispositivo predeterminado.
#
# ALSA_CARD en docker-compose controla cuál tarjeta usa el script Python.
# Este archivo solo evita mensajes de error al inicializar PyAudio.

pcm.!default {
    type asym
    playback.pcm {
        type plug
        slave.pcm "hw:0,0"
    }
    capture.pcm {
        type plug
        slave.pcm "hw:1,0"
    }
}

ctl.!default {
    type hw
    card 0
}
